# Netlify configuration for νόησις workspace

[build]
  # Build configuration for the new noesis‑lab site.  The project lives in the
  # `noesis-lab` subdirectory, so Netlify checks out the repo there before
  # running the command.  Output is generated under `frontend/dist`, which is
  # the folder we publish.
  base = "noesis-lab"
  command = "npm run build"
  publish = "frontend/dist"

# SPA-style routing for the React app in noesis-lab.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers applied to the new application
[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
