# Netlify configuration for νόησις workspace

[build]
  # Build configuration for the noesis-lab application.
  # After reorganization, the app lives under apps/noesis-lab.
  # Base directory is set to apps/noesis-lab, so build runs from there.
  # Output is published from frontend/dist (relative to base).
  base = "apps/noesis-lab"
  command = "npm install && cd frontend && npm install && npm run build"
  publish = "frontend/dist"

# SPA-style routing for the React app in noesis-lab.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers applied to the new application
[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
